<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Profile</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background: rgb(226, 59, 87);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card{
            width: 320px;
            border-radius: 12px;
            overflow: hidden;
            background: cyan;
            padding-bottom: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }

        .photo img{
            width: 100%;
            height: 350px;
            display: block;
        }

        .name{
            background: blue;
            margin: 12px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .name h1{
            font-size: 24px; 
            font-family: Georgia, serif;
        }

        .name a{
            text-decoration: none;
            color:white;
        }

        .bio{
            background:purple;
            margin: 12px;
            padding: 18px;
            border-radius: 12px;
            text-align: center;
        }

        .bio p{
            color: white;
            font-size: 20px;
            font-family: Georgia, serif;
        }

    </style>
</head>
<body>

    <div class="card">

        <div class="photo">
            <img src="jishan.jpeg" alt="Jishan">
        </div>

        <div class="name">
            <h1>
                <a href="https://www.instagram.com/jishan___ahmad/" target="_blank">
                    @jishan___ahmad
                </a>
            </h1>
        </div>

        <div class="bio">
            <p>
                You can follow me on Instagram 😍.
            </p>
        </div>

    </div>

</body>
</html>
